# src/qmap/config.yml
host: ionq
backend: qpu.forte-enterprise-1
env_path: tokens.env

# Global defaults (used if not specified in the problem)
# Can be overriden per problem
reps: 5
minQubits: 2
maxQubits: 8
qubitStep: 2
minShots: 1024
maxShots: 1024
shotStep: 0

problems:
  - name: "BV"
    minQubits: 4
    maxQubits: 4
    qubitStep: 1
    nickname: "BV"
