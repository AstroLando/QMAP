name: qmap_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pandas
  - pyyaml
  - python-dotenv
  - pip:
      - qiskit>=2.0.0
      - qiskit-ibm-runtime
      - qiskit-aer
      - qiskit-ionq
      - "iqm-client[qiskit]"
      - qnexus
      - pytket-qiskit
      - -e .